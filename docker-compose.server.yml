services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: daydayup-backend:server-amd64
    container_name: daydayup-backend
    restart: always
    ports:
      # 暴露到宿主 5000，TA-CN 容器继续走 host.docker.internal:5000 即可
      - "5000:5000"
    extra_hosts:
      # 让容器内可通过 host.docker.internal 访问宿主机网络（mysql 容器在宿主网络）
      - "host.docker.internal:host-gateway"
    volumes:
      # 源码 overlay（2026-05-30）：后端改代码只需 rsync 到宿主机 backend/ + docker restart 秒级生效，免 rebuild
      #   与 TA-CN overlay 一致；依赖(requirements)变更时仍需 rebuild。
      #   配置走下方 environment（load_dotenv override=False，不会被 /app/.env 覆盖）。
      #   .tgb_cookie/.tgb_credentials 随 ./backend:/app 一起挂入（/app/.tgb_cookie），无需单独挂载。
      - ./backend:/app
      - daydayup_logs:/app/logs
      - daydayup_uploads:/app/uploads
    env_file:
      # DB/SECRET 等敏感配置移到 .env.server（.gitignore 排除，不进仓库；rsync 到服务器 backend/）
      - ./backend/.env.server
    environment:
      TZ: "Asia/Shanghai"
      PYTHONUNBUFFERED: "1"
    networks:
      - daydayup-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: daydayup-frontend:server-amd64
    container_name: daydayup-frontend
    restart: always
    ports:
      # 接管宿主机原 nginx 的端口
      - "20080:80"
    volumes:
      # 与 backend 共享 uploads，nginx 直接对外提供静态文件
      - daydayup_uploads:/usr/share/nginx/uploads:ro
    depends_on:
      - backend
    networks:
      - daydayup-network

volumes:
  daydayup_logs:
    name: daydayup_logs
  daydayup_uploads:
    name: daydayup_uploads

networks:
  daydayup-network:
    driver: bridge
    name: daydayup-network
